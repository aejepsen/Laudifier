name: Laudifier — Keepalive

on:
  schedule:
    - cron: '*/5 * * * *'   # a cada 5 minutos — evita cold start no Container App
  workflow_dispatch:

jobs:
  ping:
    name: Ping Backend
    runs-on: ubuntu-latest
    steps:
      - name: Ping health/live
        run: |
          URL="https://laudifier-production-backend.whitehill-653d23c7.eastus2.azurecontainerapps.io/health/live"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" --max-time 30 --retry 3 --retry-delay 5)
          echo "Ping → $URL — HTTP ${STATUS}"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ Container respondeu HTTP ${STATUS} (pode estar a cold start)"
          else
            echo "✅ Container ativo"
          fi
