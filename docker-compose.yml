# docker-compose.yml — produção/base (sem source mounts, versões fixas)
#
# Qdrant: padrão = Qdrant Cloud (QDRANT_URL no .env).
# Para subir Qdrant local: docker compose --profile local-qdrant up
services:

  qdrant:
    image: qdrant/qdrant:v1.9.4
    container_name: laudifier-qdrant
    profiles: ["local-qdrant"]   # não sobe por padrão — use cloud ou ative o profile
    # porta interna apenas — override.yml expõe 6333 em dev
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laudifier-backend
    ports: ["8000:8000"]
    env_file: .env
    environment:
      USE_LOCAL_STORAGE: "true"
      # QDRANT_URL vem do .env (cloud ou http://qdrant:6333 se local)
    volumes:
      - ./storage:/app/storage
      - whisper_models:/home/app/.cache/whisper
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped

volumes:
  qdrant_data:
  whisper_models:
